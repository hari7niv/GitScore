spring.application.name=gigscore
spring.datasource.url=jdbc:mysql://localhost:3306/gigscore
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.security.user.name=${SPRING_SECURITY_USER:admin}
spring.security.user.password=${SPRING_SECURITY_PASSWORD:}

jwt.secret=${JWT_SECRET:change-this-jwt-secret-in-env}

# For local development only. In production, always provide GEMINI_API_KEY through environment configuration.
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
